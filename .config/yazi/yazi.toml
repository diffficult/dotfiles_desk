# Minimal yazi.toml for Yazi 26.5.6
# Kitty terminal on Wayland/Hyprland
# Last updated: 2026-05-11
#
# IMPORTANT: For Kitty graphics protocol to work in tmux, add this to ~/.tmux.conf:
#
#   # Enable Kitty graphics protocol passthrough
#   set-option -g allow-passthrough on
#
#   # Set default terminal with 256 colors
#   set-option -g default-terminal "tmux-256color"
#
#   # Enable True Color support for Kitty
#   set-option -ga terminal-overrides ",xterm-kitty:Tc"
#
# After editing tmux.conf, restart all tmux sessions for changes to take effect.

# ============================================================================
# PREVIEW SECTION - REQUIRED FOR ALL PREVIEWS
# ============================================================================
[preview]
wrap            = "no"
tab_size        = 2
max_width       = 1800
max_height      = 2400
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

# ============================================================================
# MANAGER SECTION - BASIC FILE MANAGER BEHAVIOR
# ============================================================================
[mgr]
ratio          = [ 1, 2, 4 ]
# Sort files by method, options: "alphabetical", "natural", "mtime", "btime", "extension", "size", "random"
sort_by = "mtime"
sort_sensitive = false
sort_reverse   = true
sort_dir_first = true
sort_translit  = false
linemode       = "none"
show_hidden    = false
show_symlink   = true
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]

# ============================================================================
# OPENER SECTION - WHAT PROGRAMS OPEN WHICH FILES
# ============================================================================
[opener]
edit = [
  { run = '${EDITOR:-nvim} %s', block = true, desc = "$EDITOR", for = "linux" },
  { run = 'nvim %s', block = true, desc = "neovim", for = "linux" },
  { run = 'kitty --detach nvim %s', orphan = true, desc = "neovim (detached)", for = "linux" },
  { run = 'zeditor %s', orphan = true, desc = "zed-editor", for = "linux" },
  { run = 'xdg-open %s1', orphan = true, desc = "xdg-open", for = "linux" },
]
open = [
	{ run = 'xdg-open %s1', orphan = true, desc = "Open", for = "linux" },
]
reveal = [
	{ run = 'xdg-open %d1', orphan = true, desc = "Reveal", for = "linux" },
	{ run = '''clear; exiftool %s1; echo "Press enter to exit"; read _''', block = true, desc = "Show EXIF" },
]
extract = [
	{ run = 'ya pub extract --list %s', desc = "Extract here" },
]
play = [
	{ run = 'mpv --force-window %s', orphan = true, desc = "Play" },
	{ run = 'mpv --force-window %*',   orphan = true, desc = "Play", for = "windows" },
	{ run = '''mediainfo %s1; echo "Press enter to exit"; read _''', block = true, desc = "Show media info" },
]


# ============================================================================
# OPENER SECTION - WHAT PROGRAMS OPEN WHICH FILES
# ============================================================================
[open]
rules = [
	# Folder
	{ url = "*/", use = [ "edit", "open", "reveal" ] },
	# Text
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	# Image
	{ mime = "image/*", use = [ "open", "reveal" ] },
	# Media
	{ mime = "{audio,video}/*", use = [ "play", "reveal" ] },
	# PDF
	{ mime = "application/pdf", use = [ "open", "reveal" ] },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
	# Code
	{ mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [ "edit", "reveal" ] },
	# Empty file
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },
	# Fallback
	{ url = "*", use = [ "open", "reveal" ] },
]

# ============================================================================
# PLUGIN SECTION - PLUGIN CONFIGURATION
# ============================================================================
[plugin]

# Git status fetcher
prepend_fetchers = [
	{ group = "git", url = "*", run = "git" },
	{ group = "git", url = "*/", run = "git" },
]

# Office document previews with office.yazi
prepend_preloaders = [
	{ mime = "application/msword", run = "office" },
	{ mime = "application/vnd.ms-excel", run = "office" },
	{ mime = "application/vnd.openxmlformats-officedocument.wordprocessingml.*", run = "office" },
	{ mime = "application/vnd.openxmlformats-officedocument.spreadsheetml.*", run = "office" },
	{ url = "*.doc", run = "office" },
	{ url = "*.docx", run = "office" },
	{ url = "*.xls", run = "office" },
	{ url = "*.xlsx", run = "office" },
]

# Archive preview with ouch
prepend_previewers = [
	{ mime = "application/msword", run = "office" },
	{ mime = "application/vnd.ms-excel", run = "office" },
	{ mime = "application/vnd.openxmlformats-officedocument.wordprocessingml.*", run = "office" },
	{ mime = "application/vnd.openxmlformats-officedocument.spreadsheetml.*", run = "office" },
	{ url = "*.doc", run = "office" },
	{ url = "*.docx", run = "office" },
	{ url = "*.xls", run = "office" },
	{ url = "*.xlsx", run = "office" },
	# Markdown preview: run glow inside a pseudo-TTY so headings/colors match
	# the normal CLI render more closely.
	# If preview performance becomes a problem, switch to a direct piper+glow
	# command with a dedicated no-TTY/Yazi theme, e.g.:
	# piper -- CLICOLOR_FORCE=1 glow -w=$w --style "$HOME/.config/glow/new-yazi.json" "$1"
	{ mime = "text/markdown", run = 'piper -- script -qec "glow -w=$w \"$1\"" /dev/null' },
	{ url = "*.md", run = 'piper -- script -qec "glow -w=$w \"$1\"" /dev/null' },
	{ mime = "application/*zip", run = "ouch" },
	{ mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", run = "ouch" },
]
