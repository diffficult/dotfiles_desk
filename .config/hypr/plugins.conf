# ============================================================================
# HYPRLAND PLUGINS CONFIGURATION
# ============================================================================
# This file contains plugin configuration and settings.
# Plugins are managed via hyprpm (Hyprland Plugin Manager)
#
# To list installed plugins: hyprpm list
# To enable a plugin: hyprpm enable <plugin-name>
# To reload plugins: hyprpm reload
#
# Reference: https://wiki.hypr.land/Plugins/

# ============================================================================
# HYPREXPO - Workspace Overview Plugin
# ============================================================================
# Provides workspace grid overview (replaces Hyprspace)
# Repository: https://github.com/hyprwm/hyprland-plugins/tree/main/hyprexpo
# Keybind: Super+O → hyprexpo:expo, toggle

plugin:hyprexpo:columns = 3
plugin:hyprexpo:gap_size = 5
plugin:hyprexpo:bg_col = rgb(111111)
plugin:hyprexpo:workspace_method = center current

plugin:hyprexpo:enable_gesture = true
plugin:hyprexpo:gesture_fingers = 3
plugin:hyprexpo:gesture_distance = 300
plugin:hyprexpo:gesture_positive = true
