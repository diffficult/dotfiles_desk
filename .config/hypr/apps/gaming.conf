# ============================================================================
# GAMING WINDOW RULES
# ============================================================================

# Apply gaming tag to all gaming-related windows
windowrule {
  name = gaming-tag-steam
  match:class = ^(steam|Steam|steam_app_.*)$

  tag = +gaming
}

windowrule {
  name = gaming-tag-retroarch
  match:class = com.libretro.RetroArch

  tag = +gaming
}

# ============================================================================
# WINBOAT RULES
# ============================================================================

# WinBoat: float the VM launcher window
windowrule {
  name = winboat-float
  match:class = ^winboat$

  float = on
  center = on
}

# ============================================================================
# STEAM RULES
# ============================================================================

# Steam UI windows: float by default so library/game-management views
# do not tile behind the main client.
windowrule {
  name = steam-ui-float
  match:class = ^(steam|Steam)$

  float = on
  center = on
  workspace = 8
}

# Steam client: keep the main window at a specific size
windowrule {
  name = steam-client-main
  match:class = ^(steam|Steam)$
  match:title = ^(steam|Steam)$

  opacity = 1 override 1 override
  size = 2350 1280
}

# Steam friends list: smaller floating window
windowrule {
  name = steam-friends-list
  match:class = ^(steam|Steam)$
  match:title = ^(Friends List)$

  size = 460 800
}

# Steam games: prevent idle during gameplay
windowrule {
  name = steam-idle-inhibit
  match:class = ^(steam|Steam)$

  idle_inhibit = fullscreen
  workspace = 8
}

# Steam games: immediate rendering mode for better performance
windowrule {
  name = steam-games-immediate
  match:class = ^(steam_app_.*|cs2)$

  immediate = on
  workspace = 8
}

# Steam games: fullscreen by default
windowrule {
  name = steam-games-fullscreen
  match:class = ^(steam_app_.*)$

  fullscreen = on
  workspace = 8
}

# ============================================================================
# RETROARCH RULES
# ============================================================================

# RetroArch: fullscreen, opaque, prevent idle
windowrule {
  name = retroarch-gaming
  match:class = com.libretro.RetroArch

  fullscreen = on
  opaque = on
  idle_inhibit = fullscreen
}
