# Define terminal tag to style them uniformly
windowrule = match:class ^(Alacritty|kitty|com.mitchellh.ghostty|dev.warp.Warp)$, tag +terminal

# ============================================================================
# WARP TERMINAL
# ============================================================================
# Always floating, centered, with a relative size based on 2560x1440 monitors.

windowrule {
  name = warp-float
  match:class = ^(dev.warp.Warp)$

  float = on
  center = on
  size = (monitor_w*0.62) (monitor_h*0.69)
}
