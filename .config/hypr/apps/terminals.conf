# ============================================================================
# TERMINAL WINDOW RULES
# ============================================================================

# Apply terminal tag
windowrule = match:class ^(Alacritty|kitty|com.mitchellh.ghostty|dev.warp.Warp)$, tag +terminal

# ============================================================================
# WARP
# ============================================================================

windowrule {
  name = terminal-warp-float
  match:class = ^(dev.warp.Warp)$

  float = on
  center = on
  size = (monitor_w*0.62) (monitor_h*0.69)
}

# ============================================================================
# CUSTOM FLOATING TERMINALS
# ============================================================================

# Passwordless sudo prompt (footclient)
windowrule {
  name = terminal-sudo-passwordless-float
  match:class = ^(warmind\.sudo\.passwordless)$

  float = on
  center = on
  size = 728 788
}

# BNATXTGen work TUI
windowrule {
  name = terminal-bnatxtgen-float
  match:class = ^(BNATXTGen)$

  float = on
  center = on
  size = 1331 1045
}
