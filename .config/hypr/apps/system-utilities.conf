# ============================================================================
# SYSTEM UTILITIES WINDOW RULES
# ============================================================================

# ============================================================================
# TAG RULES
# ============================================================================

# Tagged floating windows
windowrule {
  name = system-tag-floating-window
  match:tag = floating-window

  float = on
  center = on
  size = 875 600
}

# Hypr cheatsheet popup (footclient)
windowrule {
  name = system-hypr-cheatsheet-float
  match:class = ^(hypr-cheatsheet)$
  match:title = ^(Hypr Cheatsheet)$

  tag = +floating-window +pop
  float = on
  center = on
  size = 556 840
}

# No transparency on media windows
windowrule {
  name = system-tag-media-opaque
  match:tag = +media

  opaque = on
}

# Popped window rounding
windowrule {
  name = system-tag-pop-rounding
  match:tag = pop

  rounding = 8
}

# Prevent idle while open
windowrule {
  name = system-tag-noidle
  match:tag = noidle

  idle_inhibit = always
}

# ============================================================================
# AUDIO CONTROLS
# ============================================================================

# PulseAudio/PipeWire Volume Control
windowrule {
  name = system-pavucontrol-float
  match:class = ^(org\.pulseaudio\.pavucontrol|pavucontrol|Pavucontrol)$

  float = on
}

windowrule {
  name = system-pavucontrol-size
  match:class = ^(org\.pulseaudio\.pavucontrol)$

  center = on
  size = 1000 800
}

windowrule {
  name = system-pavucontrol-scratchpad
  match:class = ^(pavucontrol|Pavucontrol)$

  workspace = special:scratchpad silent
}

# ============================================================================
# BLUETOOTH & NETWORK
# ============================================================================

# Bluetooth Manager
windowrule {
  name = system-blueman-float
  match:class = ^(blueman-manager|Blueman-manager)$

  float = on
  center = on
  size = 600 680
}

# Network Manager Connection Editor
windowrule {
  name = system-network-manager-float
  match:class = ^(nm-connection-editor)$

  float = on
  center = on
  size = 600 500
}

# ============================================================================
# RGB & PERIPHERALS
# ============================================================================

# OpenRGB
windowrule {
  name = system-openrgb-float
  match:initial_class = ^(org\.openrgb\.OpenRGB)$

  float = on
  center = on
  size = 1142 560
}

# OpenRazer (Polychromatic)
windowrule {
  name = system-polychromatic-float
  match:class = ^(polychromatic)$

  float = on
  center = on
  size = 1000 500
}

# ============================================================================
# SYSTEM SETTINGS & TOOLS
# ============================================================================

# Qt5 Settings
windowrule {
  name = system-qt5ct-float
  match:class = ^(qt5ct)$

  float = on
  center = on
  size = 600 680
}

# Calendar
windowrule {
  name = system-gsimplecal-float
  match:class = ^(gsimplecal)$

  float = on
  move = cursor -34 0
}

# Seahorse (Password/Key Manager)
windowrule {
  name = system-seahorse-float
  match:class = ^(seahorse|Seahorse)$

  float = on
}

# ProtonVPN
windowrule {
  name = system-protonvpn-float
  match:class = ^(protonvpn)$

  float = on
}

# Syncthing GTK
windowrule {
  name = system-syncthing-float
  match:class = ^(syncthing-gtk)$

  float = on
  center = on
  size = 900 700
}

# MEGAsync main window on DP-2
windowrule {
  name = system-megasync-main-dp2
  match:class = ^(MEGAsync)$
  match:title = ^(MEGAsync)$

  float = on
  move = 4705 259
}

# MEGAsync secondary windows
windowrule {
  name = system-megasync-secondary-float
  match:class = ^(MEGAsync)$
  match:title = ^(Settings|Files|window|Window)$

  float = on
  center = on
}

# GNOME Software Center
windowrule {
  name = system-gnome-software-float
  match:class = ^(org\.gnome\.Software)$

  float = on
  center = on
  size = 1100 1000
}

# Gear Lever
windowrule {
  name = system-gearlever-float
  match:class = ^(it\.mijorus\.gearlever)$

  float = on
  center = on
}

# Bottles
windowrule {
  name = system-bottles-float
  match:class = ^(com\.usebottles\.bottles)$

  float = on
  center = on
  size = 1420 901
}

# NVIDIA Settings
windowrule {
  name = system-nvidia-settings-float
  match:class = ^(nvidia-settings)$

  float = on
  center = on
  size = 1050 750
}

# Obsidian (note-taking app)
windowrule {
  name = system-obsidian-workspace-10
  match:class = ^(obsidian)$

  workspace = 10
}

# GNOME Disks
windowrule {
  name = system-disks-float
  match:class = ^(org\.gnome\.DiskUtility)$

  float = on
  center = on
  size = 1140 780
}

# GNOME Calculator
windowrule {
  name = system-calculator-float
  match:class = ^(org\.gnome\.Calculator)$

  float = on
  center = on
  size = 427 616
}

# GNOME Weather
windowrule {
  name = system-gnome-weather-float
  match:class = ^(org\.gnome\.Weather)$

  float = on
  center = on
  size = 1040 620
}

# GNOME Usage
windowrule {
  name = system-gnome-usage-float
  match:class = ^(org\.gnome\.Usage)$

  float = on
  center = on
  size = 1040 620
}

# GNOME Logs
windowrule {
  name = system-gnome-logs-float
  match:class = ^(org\.gnome\.Logs)$

  float = on
  center = on
  size = 1260 740
}

# ============================================================================
# OFFICE & PRODUCTIVITY
# ============================================================================

# Workspace 6: Office applications
windowrule {
  name = system-office-workspace-6
  match:class = ^(libreoffice.*|Gimp|gimp)$

  workspace = 6
}

# ============================================================================
# VIRTUAL MACHINES & REMOTE
# ============================================================================

# Workspace 10: System/VMs/Remote
windowrule {
  name = system-vm-workspace-10
  match:class = ^(Virt-manager|virt-manager|RustDesk|rustdesk|protonvpn|winboat|Winboat)$

  workspace = 10
}

# QEMU: force opaque for better performance
windowrule {
  name = system-qemu-opaque
  match:class = qemu

  opaque = on
}

# scrcpy: phone screen mirroring
windowrule {
  name = system-scrcpy-float
  match:class = ^(scrcpy)$

  float = on
  size = 2350 1280
}

# ============================================================================
# NOTIFICATIONS
# ============================================================================

# System Trays & Indicators
windowrule {
  name = system-notification-daemon-no-focus
  match:class = ^(mako|dunst)$

  no_focus = on
}

windowrule {
  name = system-notification-title-no-focus
  match:title = ^(Notification)$

  no_focus = on
}

# ============================================================================
# CLIPBOARD MANAGER
# ============================================================================

# Clipse clipboard manager
windowrule {
  name = system-clipse-float
  match:class = ^(clipse-float)$

  float = on
  center = on
  size = 800 600
}
