# ============================================================================
# FILE MANAGER WINDOW RULES
# ============================================================================

# Apply file-manager tag to all file managers
windowrule {
  name = file-manager-tag-app
  match:class = ^(nautilus|Nautilus|nemo|Nemo|thunar|Thunar|caja|Caja)$

  tag = +file-manager
}

# ============================================================================
# WORKSPACE ASSIGNMENT
# ============================================================================

windowrule {
  name = file-manager-workspace-3
  match:class = ^(Nautilus|nautilus|Nemo|nemo|Thunar|thunar)$

  workspace = 3
}

# ============================================================================
# FLOAT & SIZE RULES
# ============================================================================

# File managers float by default with consistent size
windowrule {
  name = file-manager-default-float
  match:class = ^(nautilus|Nautilus|nemo|Nemo|thunar|Thunar)$

  float = on
  center = on
  size = 1200 700
}

# File roller (archive manager)
windowrule {
  name = file-manager-archive-float
  match:class = ^(file-roller|File-roller|org\.gnome\.FileRoller)$

  float = on
  center = on
}

# ============================================================================
# PREVIEW WINDOWS
# ============================================================================

# Sushi preview for GNOME file managers
windowrule {
  name = file-manager-sushi-preview
  match:class = ^(org\.gnome\.sushi)$

  float = on
  center = on
}

# Custom preview windows (imv, nemo-preview)
windowrule {
  name = file-manager-custom-preview
  match:class = ^(imv|nemo-preview)$

  float = on
  center = on
}

# Swayimg image viewer
windowrule {
  name = file-manager-swayimg-preview
  match:class = ^(swayimg.*)$

  float = on
  center = on
  tag = +no-border
}

# ============================================================================
# DIALOG WINDOWS
# ============================================================================

# Browse/file picker dialogs
windowrule {
  name = file-manager-browse-dialog
  match:class = ^(nemo|nautilus|caja|thunar)$
  match:title = ^(Browse)$

  float = on
}
