# ============================================================================
# COMMUNICATION APPS WINDOW RULES
# ============================================================================

# Apply communication tag
windowrule {
  name = communication-tag-app
  match:class = ^(org.telegram.desktop|localsend|LocalSend|rustdesk|RustDesk|discord|vesktop|Keybase)$

  tag = +communication
}

# ============================================================================
# WORKSPACE ASSIGNMENTS
# ============================================================================

# Workspace 8: Keybase
windowrule {
  name = communication-keybase-workspace-8
  match:class = ^(Keybase)$

  workspace = 8
}

# Workspace 9: Communication apps
windowrule {
  name = communication-workspace-9
  match:class = ^(org.telegram.desktop|localsend|LocalSend|vesktop)$

  workspace = 9
}

# Keybase: floating, centered, fixed size on workspace 8
windowrule {
  name = communication-keybase-float
  match:class = ^(Keybase)$

  float = on
  center = on
  size = 799 869
}

# ============================================================================
# TELEGRAM RULES
# ============================================================================

windowrule {
  name = communication-telegram-no-border
  match:class = ^(org.telegram.desktop)$

  tag = +no-border
}

# ============================================================================
# LOCALSEND RULES
# ============================================================================

# Float LocalSend and fzf file picker
windowrule {
  name = communication-localsend-float
  match:class = (Share|localsend|org\.localsend\.localsend_app)

  float = on
  center = on
  size = 800 650
}

# ============================================================================
# REMOTE CHAT APPS
# ============================================================================

# Whatsie, RustDesk: float by default
windowrule {
  name = communication-remote-chat-float
  match:class = ^(org.telegram.desktop|rustdesk|RustDesk)$

  float = on
}

# Discord: no border
windowrule {
  name = communication-discord-no-border
  match:class = ^(discord|vesktop)$
  
  tag = +no-border
  float = on
  size = 1800 1100
}
