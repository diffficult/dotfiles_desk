# ============================================================================
# MEDIA WINDOW RULES
# ============================================================================

# Apply media tag to all media players
windowrule {
  name = media-tag-app
  match:class = ^(mpv|Mpv|vlc|zoom|org\.kde\.kdenlive|com\.obsproject\.Studio|com\.github\.PintaProject\.Pinta|imv|org\.gnome\.NautilusPreviewer)$

  tag = +media
}

# ============================================================================
# MPV RULES
# ============================================================================

# MPV: float by default with solid opacity
windowrule {
  name = media-mpv-float-opaque
  match:class = ^(mpv|Mpv)$

  float = on
  keep_aspect_ratio = on
  opacity = 1 override 1 override
}

# MPV YouTube videos: slight transparency (matches global default, kept for documentation)
# windowrule {
#   name = mpv-youtube-transparent
#   match:class = ^(mpv|Mpv)$
#   match:title = ^(watch\?v.*)$
#
#   opacity = 1 0.85
# }

# ============================================================================
# YTMPV
# ============================================================================

# YouTube videos via scripts (720p, 1080p, 480p)
windowrule {
  name = media-ytmpv-quality-stream
  match:title = ^((720p|1080p|480p) - /watch\?v.*)$

  size = 1132 679
  workspace = 2
  keep_aspect_ratio = on
  move = 14 747
}

# Fallback: YouTube URLs opened outside of scripts
windowrule {
  name = media-ytmpv-main-video
  match:title = ^(watch\?v.*)$

  size = 1132 679
  workspace = 2
  keep_aspect_ratio = on
  move = 14 747
}

# ============================================================================
# WEBCAM RULES
# ============================================================================

# CAM 01 window
windowrule {
  name = media-webcam-cam01
  match:title = ^(101)$

  size = 1132 680
  workspace = 2
  keep_aspect_ratio = on
  move = 14 53
}

# ============================================================================
# MUSIC
# ============================================================================

# NCMPCPP music player
windowrule {
  name = media-ncmpcpp-float
  match:title = (ncmpcpp)

  float = on
  size = 1200 676
  move = 13 755
}

# Spotify
windowrule {
  name = media-spotify-workspace-5
  match:class = ^(Spotify|spotify)$

  workspace = 5
}

# ============================================================================
# SCREENSHOT / ANNOTATION TOOLS
# ============================================================================

# Satty: keep a large centered 16:9 canvas close to the current live window size.
windowrule {
  name = media-satty-float
  match:class = ^(com\.gabm\.satty)$

  float = on
  center = on
  size = 1936 1089
}

# ============================================================================
# IMAGE/DOCUMENT VIEWERS
# ============================================================================

# Workspace 7: Image/Document viewers
windowrule {
  name = media-viewer-workspace-7
  match:class = ^(Gpicview|gpicview|Zathura|zathura|org.pwmt.zathura|swayimg_.*)$

  workspace = 7
  tag = +no-border
}
