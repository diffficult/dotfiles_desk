# ============================================================================
# HYPRLAND CORE WINDOW RULES
# ============================================================================

# ============================================================================
# STABILITY
# ============================================================================

windowrule = match:class .*, suppress_event maximize
windowrule = match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0, no_focus on

# ============================================================================
# TAG RULES
# ============================================================================

windowrule {
  name = core-tag-no-border
  match:tag = +no-border

  border_size = 0
}

windowrule {
  name = core-tag-media-opaque
  match:tag = +media

  opaque = on
}

windowrule {
  name = core-tag-password-manager-security
  match:tag = +password-manager

  no_screen_share = on
}

# ============================================================================
# GENERIC FLOATING WINDOWS
# ============================================================================

windowrule {
  name = core-file-dialog-float
  match:title = ^(Open File|Save File|Save As|Open Document)$

  float = on
  center = on
  border_size = 0
}

windowrule {
  name = core-about-dialog-float
  match:title = ^(About ).*$

  float = on
}

windowrule {
  name = core-file-progress-float
  match:class = ^(file_progress)$

  float = on
}

windowrule {
  name = core-generic-dialog-float
  match:class = ^(.*-picker|.*-dialog|.*-preferences)$

  float = on
}

windowrule {
  name = core-zenity-no-border
  match:class = ^(zenity)$

  border_size = 0
}

windowrule {
  name = core-window-type-float
  match:title = ^(pop-up|task_dialog|bubble|dialog|menu|Preferences)$

  float = on
}

# ============================================================================
# TERMINAL VARIANTS
# ============================================================================

windowrule {
  name = core-footclient-float
  match:class = ^(footclient-float.*)$

  float = on
  center = on
}

windowrule {
  name = core-footclient-cpu
  match:title = ^(CPU.*)$

  size = 900 720
}

windowrule {
  name = core-footclient-weather
  match:title = ^(Weather.*)$

  size = 924 1196
}

windowrule {
  name = core-footclient-yay
  match:title = ^(yay.*)$

  size = 800 760
}

windowrule {
  name = core-warmind-install-tui
  match:class = ^(warmind\.install\.tui)$

  float = on
  center = on
}

windowrule {
  name = core-warmind-install-webapp
  match:class = ^(warmind\.install\.webapp)$

  float = on
  center = on
}

windowrule {
  name = core-st-float-variants
  match:class = ^(St|drawn-st|floating-kitty|floating_update)$

  float = on
}

windowrule {
  name = core-st-title-float
  match:class = ^(st)$
  match:title = ^(st)$

  float = on
}

# ============================================================================
# WAYBAR UTILITIES
# ============================================================================

windowrule {
  name = core-waybar-manager-float
  match:class = ^(waybar-manager)$

  float = on
  size = 800 600
  center = on
}

windowrule {
  name = core-waybar-widget-float
  match:class = ^(floating-waybar-(cpu|weather|pacman|calendar))$

  float = on
  center = on
}

# ============================================================================
# CORE WORKSPACE ASSIGNMENTS
# ============================================================================

windowrule {
  name = core-terminal-workspace-2
  match:class = ^(Xfce4-terminal|Alacritty)$

  workspace = 2
}

windowrule {
  name = core-kitty-workspace-2-float
  match:class = ^(kitty)$

  float = on
  workspace = 2
  size = 1386 1373
  move = 1160 53
}

windowrule {
  name = core-wezterm-workspace-8
  match:class = ^(wezterm|Wezterm)$

  workspace = 8
}
