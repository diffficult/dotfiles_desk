# ============================================================================
# HYPRLAND AUTOSTART
# ============================================================================

# ============================================================================
# CORE SESSION SERVICES
# ============================================================================

exec-once = hyprpm reload -n &
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
exec-once = eval $(gnome-keyring-daemon --start) &
exec-once = uwsm app -- swaync
exec-once = /usr/libexec/xdg-desktop-portal-hyprland &
exec-once = /usr/libexec/xdg-desktop-portal &
exec-once = pactl load-module module-switch-on-connect &
exec-once = uwsm app -- clipse -listen

# ============================================================================
# SHELL AND DESKTOP UI
# ============================================================================

exec-once = uwsm app -- waybar
exec-once = uwsm app -- qs

# >>> warmind-launcher >>>
exec-once = uwsm app -- qs -n -d -c /home/rx/.config/warmind/launcher
# exec-once = uwsm app -- qs -n -d -c /home/rx/.config/quickshell/song-slide
# exec-once = uwsm app -- qs -n -d -c /home/rx/.config/quickshell/expose
# exec-once = uwsm app -- qs -n -d -c /home/rx/.config/quickshell/clipboard-ripple
# <<< warmind-launcher <<<

exec-once = systemctl --user start skwd-daemon.service
exec-once = awww-daemon &

# ============================================================================
# SYSTEM HELPERS
# ============================================================================

exec-once = uwsm app -- /usr/lib/geoclue-2.0/demos/agent

# ============================================================================
# USER APPS AND DAEMONS
# ============================================================================

exec-once = (sleep 10 && uwsm app -- openrgb --startminimized --profile default) &
exec-once = uwsm app -- dropbox &
exec-once = (for _ in $(seq 1 20); do busctl --user get-property org.kde.StatusNotifierWatcher /StatusNotifierWatcher org.kde.StatusNotifierWatcher IsStatusNotifierHostRegistered >/dev/null 2>&1 && break; sleep 1; done; uwsm app -- env QT_QPA_PLATFORM=xcb megasync) &
exec-once = uwsm app -- syncthing-gtk &

# ============================================================================
# INPUT DEVICE SETUP
# ============================================================================

exec-once = ~/.local/bin/hypr_scripts/remap-trackball.sh &

